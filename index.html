<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Princess Sharkie Rhea's Birthday</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="background-effects"></div>
<canvas id="fireworks"></canvas>
<div class="container">

    <img src="spoiledBunny.gif"
         alt="Spoiled Bunny"
         class="gif">

    <h1>
        Countdown to Princess Sharkie Rhea's Birthday!
    </h1>

    <div id="countdown">

    <div class="time-box">
        <div id="days" class="number">00</div>
        <div class="label">Days</div>
    </div>

    <div class="time-box">
        <div id="hours" class="number">00</div>
        <div class="label">Hours</div>
    </div>

    <div class="time-box">
        <div id="minutes" class="number">00</div>
        <div class="label">Minutes</div>
    </div>

    <div class="time-box">
        <div id="seconds" class="number">00</div>
        <div class="label">Seconds</div>
    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
